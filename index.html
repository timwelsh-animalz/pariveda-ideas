<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI vs. automation fit-checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/%40tabler/icons-webfont/2.47.0/tabler-icons.min.css">
<style>
  :root {
    --surface-0: #F7F8FC;
    --surface-1: #E4E7F2;
    --surface-2: #FFFFFF;
    --border: #E2E4ED;
    --border-accent: #2C75FF;
    --text-primary: #010F31;
    --text-secondary: #5B6178;
    --text-muted: #8B91A6;
    --bg-accent: #EBE9F5;
    --text-accent: #1C2C80;
    --bg-pro: #EBE9F5;
    --text-pro: #2C75FF;
    --bg-warning: #EBE9F5;
    --text-warning: #FF861E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--surface-0);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text-primary);
    padding: 48px 20px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .intro { font-size: 14px; color: var(--text-secondary); margin: 0 0 28px; line-height: 1.6; }
  button {
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-primary);
    transition: border-color .15s ease, background .15s ease;
  }
  button:hover { border-color: var(--border-accent); background: var(--bg-accent); }
  button:active { transform: scale(0.99); }
  #back-btn, #restart-btn, #discuss-btn { padding: 10px 16px; }
  #discuss-btn { border-color: var(--border-accent); color: var(--text-accent); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI vs. automation fit-checker</h1>
  <p class="intro">Answer five questions about a single process to see whether it's a better fit for conventional automation, AI, or a hybrid of both.</p>
  <div id="fit-checker"></div>
</div>

<script>
(function(){
  var questions = [
    {
      text: "Picture someone making this call by hand. Given the exact same information, would they always land on the same answer?",
      options: [
        {label:"Yes \u2014 like calculating a bill from a meter reading. Same numbers in, same number out.", score:-2},
        {label:"Almost always, but a few situations need a human's gut check.", score:0},
        {label:"No \u2014 like deciding which outage to prioritize during a storm. It depends what else is going on that day.", score:2}
      ]
    },
    {
      text: "What does the information feeding this decision actually look like?",
      options: [
        {label:"Numbers and dropdowns \u2014 meter readings, account fields, GPS coordinates", score:-2},
        {label:"A mix \u2014 some clean fields, some typed-in notes", score:0},
        {label:"Mostly words \u2014 inspector notes, call transcripts, emails, photos", score:2}
      ]
    },
    {
      text: "How often do the rules for making this call change?",
      options: [
        {label:"Almost never \u2014 it's set by a tariff, a safety code, or a fixed formula", score:-2},
        {label:"Every year or so, when policy gets reviewed", score:0},
        {label:"Often \u2014 what counts as \u201curgent\u201d or \u201crisky\u201d shifts with the situation", score:2}
      ]
    },
    {
      text: "Does the decision ever come down to picking the lesser of two evils?",
      options: [
        {label:"No \u2014 there's a single correct answer once you have the inputs", score:-2},
        {label:"Sometimes, but there are clear guardrails for how to choose", score:0},
        {label:"Yes \u2014 like balancing crew safety, cost, and how fast customers get power back", score:2}
      ]
    },
    {
      text: "Why does this need to happen faster?",
      options: [
        {label:"We just have more of the same simple task \u2014 more bills, more tickets", score:-2},
        {label:"Both \u2014 more volume, and the judgment calls are getting harder too", score:0},
        {label:"The judgment itself needs to happen faster \u2014 like reading storm damage from photos in minutes instead of days", score:2}
      ]
    }
  ];

  var current = 0;
  var answers = new Array(questions.length).fill(null);
  var root = document.getElementById('fit-checker');

  function render(){
    if (current < questions.length) {
      renderQuestion();
    } else {
      renderResult();
    }
  }

  function renderQuestion(){
    var q = questions[current];
    var pct = Math.round((current / questions.length) * 100);
    var html = '';
    html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">';
    html += '<span style="font-size:13px; color:var(--text-secondary);">Question ' + (current + 1) + ' of ' + questions.length + '</span>';
    html += '</div>';
    html += '<div style="height:4px; background:var(--surface-1); border-radius:2px; overflow:hidden; margin-bottom:1.5rem;">';
    html += '<div style="height:100%; width:' + pct + '%; background:var(--border-accent);"></div>';
    html += '</div>';
    html += '<div style="background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:1.5rem;">';
    html += '<p style="font-size:16px; font-weight:500; margin:0 0 1.25rem; line-height:1.5;">' + q.text + '</p>';
    html += '<div style="display:flex; flex-direction:column; gap:8px;">';
    q.options.forEach(function(opt, i){
      html += '<button data-i="' + i + '" class="opt-btn" style="display:block; width:100%; height:auto; text-align:left; white-space:normal; line-height:1.4; padding:12px 16px;">' + opt.label + '</button>';
    });
    html += '</div></div>';
    if (current > 0) {
      html += '<div style="margin-top:1rem;"><button id="back-btn"><i class="ti ti-arrow-left" style="font-size:14px; vertical-align:-1px; margin-right:4px;" aria-hidden="true"></i>Back</button></div>';
    }
    root.innerHTML = html;

    root.querySelectorAll('.opt-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var i = parseInt(btn.getAttribute('data-i'), 10);
        answers[current] = q.options[i].score;
        current++;
        render();
      });
    });
    var backBtn = document.getElementById('back-btn');
    if (backBtn) {
      backBtn.addEventListener('click', function(){
        current--;
        render();
      });
    }
  }

  function renderResult(){
    var total = answers.reduce(function(a, b){ return a + b; }, 0);
    var min = questions.length * -2;
    var max = questions.length * 2;
    var pct = Math.round(((total - min) / (max - min)) * 100);
    var pctClamped = Math.max(5, Math.min(95, pct));

    var verdict, desc, icon, bg, fg;
    if (total <= -4) {
      verdict = "Automation fit";
      bg = "var(--bg-accent)";
      fg = "var(--text-accent)";
      icon = "ti-settings";
      desc = "This process has a deterministic flowchart \u2014 the right answer is the same every time, the data is clean, and the rules don't shift much. Conventional automation, like an RPA tool or a rules engine, will likely get this done faster and more reliably than an AI model, with far less ongoing oversight.";
    } else if (total >= 4) {
      verdict = "AI fit";
      bg = "var(--bg-pro)";
      fg = "var(--text-pro)";
      icon = "ti-bulb";
      desc = "This is the kind of process where AI earns its place: the data is messy, the rules shift, and getting it right depends on judgment and context rather than a fixed rule. A deterministic system here would either miss nuance or need constant rebuilding to keep up.";
    } else {
      verdict = "Hybrid \u2014 AI-augmented automation";
      bg = "var(--bg-warning)";
      fg = "var(--text-warning)";
      icon = "ti-adjustments";
      desc = "This process likely has a deterministic backbone worth automating conventionally, plus a layer of edge cases or judgment calls that benefit from AI. Automate the routine path end-to-end, and route the ambiguous cases to an AI-assisted review step.";
    }

    var html = '';
    html += '<div style="background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:1.5rem;">';
    html += '<div style="display:flex; align-items:center; gap:12px; margin-bottom:1rem;">';
    html += '<div style="width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:' + bg + '; color:' + fg + ';"><i class="ti ' + icon + '" style="font-size:20px;" aria-hidden="true"></i></div>';
    html += '<p style="font-size:18px; font-weight:500; margin:0;">' + verdict + '</p>';
    html += '</div>';
    html += '<p style="font-size:14px; color:var(--text-secondary); line-height:1.7; margin:0 0 1.25rem;">' + desc + '</p>';

    html += '<div style="margin-bottom:1.5rem;">';
    html += '<div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:4px;"><span>Automation</span><span>Hybrid</span><span>AI</span></div>';
    html += '<div style="position:relative; height:8px; background:var(--surface-1); border-radius:4px;">';
    html += '<div style="position:absolute; left:' + pctClamped + '%; top:50%; transform:translate(-50%,-50%); width:14px; height:14px; border-radius:50%; background:var(--text-primary); border:2px solid var(--surface-2);"></div>';
    html += '</div></div>';

    html += '<div style="display:flex; gap:8px; flex-wrap:wrap;">';
    html += '<button id="restart-btn"><i class="ti ti-refresh" style="font-size:14px; vertical-align:-1px; margin-right:4px;" aria-hidden="true"></i>Try another process</button>';
    html += '</div>';
    html += '</div>';
    root.innerHTML = html;

    document.getElementById('restart-btn').addEventListener('click', function(){
      current = 0;
      answers = new Array(questions.length).fill(null);
      render();
    });
  }

  render();
})();
</script>
</body>
</html>
